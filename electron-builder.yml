appId: com.sheetsconverter.app
productName: Sheets Converter
directories:
  buildResources: assets
  output: dist
files:
  - main.js
  - preload.js
  - backend_launcher.py
  - public/**/*
  - node_modules/**/*
  - package.json
  - api/**/*
extraResources:
  - from: api/dist/sheets-fastapi.exe
    to: backend/sheets-fastapi.exe

win:
  target:
    - nsis
    - portable
  certificateFile: null
  certificatePassword: null
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sheets Converter

portable:
  artifactName: '${productName}-${version}.exe'

linux:
  target:
    - AppImage
    - deb

mac:
  target:
    - dmg
    - zip
